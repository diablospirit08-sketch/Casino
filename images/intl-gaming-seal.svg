<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Outer gold border -->
  <circle cx="250" cy="250" r="240" fill="#0b2a5d" stroke="#d4af37" stroke-width="20"/>

  <!-- Beaded edge -->
  <circle cx="250" cy="250" r="230" stroke="#b8860b" stroke-width="5" fill="none" stroke-dasharray="2,6"/>

  <!-- Text ring -->
  <text x="250" y="80" text-anchor="middle" font-size="28" fill="#d4af37" font-family="serif">INTERNATIONAL GAMING</text>
  <text x="250" y="440" text-anchor="middle" font-size="28" fill="#d4af37" font-family="serif">OFFICIAL SEAL</text>

  <!-- Laurel wreath -->
  <path d="M150,250 C120,180 120,320 150,250 ..." fill="none" stroke="#d4af37" stroke-width="4"/>

  <!-- Scales -->
  <rect x="240" y="180" width="20" height="100" fill="#d4af37"/>
  <line x1="200" y1="180" x2="300" y2="180" stroke="#d4af37" stroke-width="6"/>
  <circle cx="200" cy="220" r="20" fill="#d4af37"/>
  <circle cx="300" cy="220" r="20" fill="#d4af37"/>

  <!-- Dice and card -->
  <rect x="180" y="220" width="30" height="30" fill="#ff0000"/>
  <rect x="290" y="220" width="30" height="40" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <text x="305" y="245" font-size="20" fill="#000000">♠</text>
</svg>
