<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- clockwise through top: text reads L→R along inside of top arc -->
    <path id="igs-top" d="M 20,100 A 80,80 0 0,1 180,100"/>
    <!-- counter-clockwise through bottom: text reads L→R along inside of bottom arc -->
    <path id="igs-bot" d="M 22,100 A 78,78 0 0,0 178,100"/>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="99" fill="#0b2a5d"/>

  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="99" fill="none" stroke="#c9a227" stroke-width="2.5"/>
  <!-- Inner ring (text sits between these two) -->
  <circle cx="100" cy="100" r="83" fill="none" stroke="#c9a227" stroke-width="1"/>

  <!-- Arc text: top -->
  <text font-size="11" fill="#c9a227" font-weight="bold" letter-spacing="2.2"
        font-family="Georgia,'Times New Roman',serif">
    <textPath href="#igs-top" startOffset="50%" text-anchor="middle">INTERNATIONAL GAMING</textPath>
  </text>

  <!-- Arc text: bottom -->
  <text font-size="11" fill="#c9a227" font-weight="bold" letter-spacing="3"
        font-family="Georgia,'Times New Roman',serif">
    <textPath href="#igs-bot" startOffset="50%" text-anchor="middle">OFFICIAL SEAL</textPath>
  </text>

  <!-- Star separators at 9 o'clock / 3 o'clock -->
  <text x="20" y="103.5" text-anchor="middle" font-size="7" fill="#c9a227">★</text>
  <text x="180" y="103.5" text-anchor="middle" font-size="7" fill="#c9a227">★</text>

  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="#c9a227" stroke-width="0.8" opacity="0.55"/>

  <!-- ── Scales of Justice ── -->
  <!-- Vertical pole -->
  <line x1="100" y1="45" x2="100" y2="120" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Top finial -->
  <circle cx="100" cy="43" r="4" fill="#c9a227"/>
  <!-- Horizontal beam -->
  <line x1="66" y1="60" x2="134" y2="60" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left pan strings -->
  <line x1="72" y1="60" x2="65" y2="80" stroke="#c9a227" stroke-width="1.4"/>
  <line x1="72" y1="60" x2="79" y2="80" stroke="#c9a227" stroke-width="1.4"/>
  <!-- Left pan bowl -->
  <path d="M 60,80 Q 72,89 84,80" fill="none" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>

  <!-- Right pan strings (slightly lower = imbalanced by design) -->
  <line x1="128" y1="60" x2="121" y2="74" stroke="#c9a227" stroke-width="1.4"/>
  <line x1="128" y1="60" x2="135" y2="74" stroke="#c9a227" stroke-width="1.4"/>
  <!-- Right pan bowl -->
  <path d="M 116,74 Q 128,83 140,74" fill="none" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>

  <!-- Pole base -->
  <line x1="88" y1="120" x2="112" y2="120" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 84,120 Q 100,127 116,120" fill="none" stroke="#c9a227" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ── Laurel wreath ── -->
  <!-- Left side leaves -->
  <g fill="#c9a227" opacity="0.88">
    <ellipse cx="47" cy="96"  rx="8.5" ry="3.5" transform="rotate(  0 47  96)"/>
    <ellipse cx="43" cy="107" rx="8.5" ry="3.5" transform="rotate(-18 43 107)"/>
    <ellipse cx="41" cy="118" rx="8"   ry="3.5" transform="rotate(-35 41 118)"/>
    <ellipse cx="43" cy="129" rx="7.5" ry="3.5" transform="rotate(-52 43 129)"/>
    <ellipse cx="50" cy="139" rx="7"   ry="3.5" transform="rotate(-68 50 139)"/>
    <ellipse cx="60" cy="147" rx="6.5" ry="3"   transform="rotate(-82 60 147)"/>
  </g>
  <!-- Right side leaves (mirrored) -->
  <g fill="#c9a227" opacity="0.88">
    <ellipse cx="153" cy="96"  rx="8.5" ry="3.5" transform="rotate(  0 153  96)"/>
    <ellipse cx="157" cy="107" rx="8.5" ry="3.5" transform="rotate( 18 157 107)"/>
    <ellipse cx="159" cy="118" rx="8"   ry="3.5" transform="rotate( 35 159 118)"/>
    <ellipse cx="157" cy="129" rx="7.5" ry="3.5" transform="rotate( 52 157 129)"/>
    <ellipse cx="150" cy="139" rx="7"   ry="3.5" transform="rotate( 68 150 139)"/>
    <ellipse cx="140" cy="147" rx="6.5" ry="3"   transform="rotate( 82 140 147)"/>
  </g>

  <!-- Bottom three stars -->
  <text x="88"  y="156" text-anchor="middle" font-size="9" fill="#c9a227">★</text>
  <text x="100" y="159" text-anchor="middle" font-size="9" fill="#c9a227">★</text>
  <text x="112" y="156" text-anchor="middle" font-size="9" fill="#c9a227">★</text>
</svg>
