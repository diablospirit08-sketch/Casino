<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0d1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4452e"/>
      <stop offset="100%" stop-color="#f0763d"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4452e"/>
      <stop offset="100%" stop-color="#f0763d"/>
    </linearGradient>
    <linearGradient id="cardFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="cardShine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0f1830"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#e05030" flood-opacity="0.6" result="col"/>
      <feComposite in="col" in2="blur" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="rgba(0,0,0,0.7)"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cardClip1">
      <rect width="72" height="100" rx="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="280" fill="url(#bg)"/>

  <!-- Subtle felt texture lines -->
  <line x1="0" y1="0" x2="400" y2="280" stroke="rgba(255,255,255,0.015)" stroke-width="80"/>
  <line x1="400" y1="0" x2="0" y2="280" stroke="rgba(255,255,255,0.015)" stroke-width="80"/>

  <!-- Bottom radial glow -->
  <ellipse cx="200" cy="290" rx="180" ry="80" fill="rgba(212,69,46,0.12)"/>

  <!-- ── PLAYER side: 3-card fan (left) ── -->
  <!-- Card P back-left -->
  <g transform="translate(62,80) rotate(-20,36,50)" filter="url(#cardShadow)">
    <rect width="72" height="100" rx="6" fill="url(#cardBack)" stroke="#253560" stroke-width="1"/>
    <rect x="5" y="5" width="62" height="90" rx="4" fill="none" stroke="#2d4080" stroke-width="0.8"/>
    <text x="36" y="56" text-anchor="middle" dominant-baseline="middle" font-size="22" fill="#d4452e" opacity="0.5">♦</text>
  </g>
  <!-- Card P mid -->
  <g transform="translate(78,70) rotate(-8,36,50)" filter="url(#cardShadow)">
    <rect width="72" height="100" rx="6" fill="url(#cardFace)" stroke="#ccc" stroke-width="0.5"/>
    <rect width="72" height="100" rx="6" fill="url(#cardShine)"/>
    <text x="7" y="16" font-size="13" font-weight="900" font-family="Georgia,serif" fill="#d4452e">K</text>
    <text x="7" y="28" font-size="11" font-family="Georgia,serif" fill="#d4452e">♥</text>
    <text x="36" y="58" text-anchor="middle" dominant-baseline="middle" font-size="36" font-family="Georgia,serif" fill="#d4452e">♥</text>
    <text x="65" y="90" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="900" font-family="Georgia,serif" fill="#d4452e" transform="rotate(180,65,90)">K</text>
  </g>
  <!-- Card P front -->
  <g transform="translate(96,65) rotate(6,36,50)" filter="url(#cardShadow)">
    <rect width="72" height="100" rx="6" fill="url(#cardFace)" stroke="#ccc" stroke-width="0.5"/>
    <rect width="72" height="100" rx="6" fill="url(#cardShine)"/>
    <text x="7" y="16" font-size="13" font-weight="900" font-family="Georgia,serif" fill="#111">A</text>
    <text x="7" y="28" font-size="11" font-family="Georgia,serif" fill="#111">♠</text>
    <text x="36" y="58" text-anchor="middle" dominant-baseline="middle" font-size="36" font-family="Georgia,serif" fill="#111">♠</text>
    <text x="65" y="90" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="900" font-family="Georgia,serif" fill="#111" transform="rotate(180,65,90)">A</text>
  </g>

  <!-- PLAYER score badge -->
  <rect x="62" y="185" width="108" height="26" rx="13" fill="#4f46e5" opacity="0.9"/>
  <text x="116" y="202" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="900" font-family="Inter,Arial,sans-serif" fill="#fff" letter-spacing="2">PLAYER  1</text>

  <!-- ── BANKER side: 3-card fan (right) ── -->
  <!-- Card B back-right -->
  <g transform="translate(266,80) rotate(20,36,50)" filter="url(#cardShadow)">
    <rect width="72" height="100" rx="6" fill="url(#cardBack)" stroke="#253560" stroke-width="1"/>
    <rect x="5" y="5" width="62" height="90" rx="4" fill="none" stroke="#2d4080" stroke-width="0.8"/>
    <text x="36" y="56" text-anchor="middle" dominant-baseline="middle" font-size="22" fill="#d4452e" opacity="0.5">♦</text>
  </g>
  <!-- Card B mid -->
  <g transform="translate(250,70) rotate(8,36,50)" filter="url(#cardShadow)">
    <rect width="72" height="100" rx="6" fill="url(#cardFace)" stroke="#ccc" stroke-width="0.5"/>
    <rect width="72" height="100" rx="6" fill="url(#cardShine)"/>
    <text x="7" y="16" font-size="13" font-weight="900" font-family="Georgia,serif" fill="#d4452e">Q</text>
    <text x="7" y="28" font-size="11" font-family="Georgia,serif" fill="#d4452e">♦</text>
    <text x="36" y="58" text-anchor="middle" dominant-baseline="middle" font-size="36" font-family="Georgia,serif" fill="#d4452e">♦</text>
    <text x="65" y="90" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="900" font-family="Georgia,serif" fill="#d4452e" transform="rotate(180,65,90)">Q</text>
  </g>
  <!-- Card B front -->
  <g transform="translate(232,65) rotate(-6,36,50)" filter="url(#cardShadow)">
    <rect width="72" height="100" rx="6" fill="url(#cardFace)" stroke="#ccc" stroke-width="0.5"/>
    <rect width="72" height="100" rx="6" fill="url(#cardShine)"/>
    <text x="7" y="16" font-size="13" font-weight="900" font-family="Georgia,serif" fill="#111">7</text>
    <text x="7" y="28" font-size="11" font-family="Georgia,serif" fill="#111">♣</text>
    <text x="36" y="52" text-anchor="middle" dominant-baseline="middle" font-size="13" font-family="Georgia,serif" fill="#111">♣  ♣</text>
    <text x="36" y="68" text-anchor="middle" dominant-baseline="middle" font-size="13" font-family="Georgia,serif" fill="#111">♣</text>
    <text x="36" y="84" text-anchor="middle" dominant-baseline="middle" font-size="13" font-family="Georgia,serif" fill="#111">♣  ♣</text>
    <text x="65" y="90" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="900" font-family="Georgia,serif" fill="#111" transform="rotate(180,65,90)">7</text>
  </g>

  <!-- BANKER score badge -->
  <rect x="230" y="185" width="108" height="26" rx="13" fill="#dc2626" opacity="0.9"/>
  <text x="284" y="202" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="900" font-family="Inter,Arial,sans-serif" fill="#fff" letter-spacing="2">BANKER  7</text>

  <!-- ── Center divider ── -->
  <line x1="200" y1="58" x2="200" y2="178" stroke="url(#accentV)" stroke-width="1" opacity="0.4"/>

  <!-- Center suit + glow -->
  <text x="200" y="128" text-anchor="middle" dominant-baseline="middle" font-size="32" fill="url(#accent)" filter="url(#softGlow)" font-family="Georgia,serif">♦</text>
  <text x="200" y="128" text-anchor="middle" dominant-baseline="middle" font-size="32" fill="url(#accent)" font-family="Georgia,serif">♦</text>

  <!-- ── Bottom label bar ── -->
  <rect x="0" y="222" width="400" height="58" fill="rgba(0,0,0,0.45)"/>
  <line x1="0" y1="222" x2="400" y2="222" stroke="url(#accent)" stroke-width="1.5" opacity="0.7"/>

  <!-- BACCARAT title -->
  <text x="200" y="248" text-anchor="middle" dominant-baseline="middle"
    font-size="22" font-weight="900" font-family="Inter,Arial,sans-serif"
    letter-spacing="6" fill="url(#accent)" filter="url(#glow)">BACCARAT</text>

  <!-- Subtitle -->
  <text x="200" y="267" text-anchor="middle" dominant-baseline="middle"
    font-size="9" font-weight="700" font-family="Inter,Arial,sans-serif"
    letter-spacing="3" fill="rgba(255,255,255,0.35)">VOLT ORIGINALS · 98.94% RTP</text>
</svg>
