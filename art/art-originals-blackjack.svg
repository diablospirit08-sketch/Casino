<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04091a"/>
      <stop offset="100%" stop-color="#07112e"/>
    </linearGradient>
    <linearGradient id="felt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#063318"/>
      <stop offset="100%" stop-color="#031f0e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="6" flood-color="rgba(0,0,0,0.7)"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- felt table arc -->
  <ellipse cx="200" cy="340" rx="260" ry="180" fill="url(#felt)" fill-opacity="0.55"/>
  <!-- card 1 — face down -->
  <rect x="70" y="55" width="110" height="158" rx="10" fill="#0d1f3d" stroke="#1e3a70" stroke-width="2" filter="url(#shadow)"/>
  <rect x="80" y="65" width="90" height="138" rx="6" fill="none" stroke="#1a3560" stroke-width="1"/>
  <text x="125" y="145" text-anchor="middle" font-family="serif" font-size="32" fill="#1a3560">♦</text>
  <!-- card 2 — ace of spades -->
  <rect x="224" y="44" width="110" height="158" rx="10" fill="#f8f8f8" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/>
  <text x="236" y="72" font-family="Arial,sans-serif" font-size="17" font-weight="900" fill="#0d0d1a">A</text>
  <text x="236" y="89" font-family="serif" font-size="15" fill="#0d0d1a">♠</text>
  <text x="279" y="135" text-anchor="middle" font-family="serif" font-size="50" fill="#0d0d1a">♠</text>
  <text x="322" y="191" text-anchor="end" font-family="Arial,sans-serif" font-size="17" font-weight="900" fill="#0d0d1a" transform="rotate(180 322 191)">A</text>
  <text x="322" y="208" text-anchor="end" font-family="serif" font-size="15" fill="#0d0d1a" transform="rotate(180 322 208)">♠</text>
  <!-- 21 glow -->
  <text x="156" y="248" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-size="42" font-weight="900" fill="#3d9bff" fill-opacity="0.55" filter="url(#glow)">21</text>
  <!-- label -->
  <text x="22" y="278" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#3d9bff" fill-opacity="0.4" letter-spacing="3">BLACKJACK</text>
</svg>
