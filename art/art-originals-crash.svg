<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#2d1000"/>
    </linearGradient>
    <linearGradient id="curve" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff4757"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- grid lines -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="#ff4757" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#ff4757" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="#ff4757" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="#ff4757" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="300" stroke="#ff4757" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="300" stroke="#ff4757" stroke-opacity="0.07" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="300" stroke="#ff4757" stroke-opacity="0.07" stroke-width="1"/>
  <!-- area under curve -->
  <path d="M20,285 C70,270 130,245 190,205 S280,130 340,65 L380,25 L400,5 L400,300 L0,300 Z" fill="#ff4757" fill-opacity="0.09"/>
  <!-- curve -->
  <path d="M20,285 C70,270 130,245 190,205 S280,130 340,65 L380,25" fill="none" stroke="url(#curve)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- explosion dot -->
  <circle cx="380" cy="25" r="18" fill="#ff4757" fill-opacity="0.3" filter="url(#glow)"/>
  <circle cx="380" cy="25" r="10" fill="#ff4757" filter="url(#glow)"/>
  <circle cx="380" cy="25" r="5" fill="#fff"/>
  <!-- multiplier box -->
  <rect x="110" y="82" width="148" height="58" rx="12" fill="rgba(0,0,0,0.55)" stroke="#ff4757" stroke-opacity="0.25" stroke-width="1"/>
  <text x="184" y="123" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-size="34" font-weight="900" fill="#ff6b35">2.47×</text>
  <!-- label -->
  <text x="26" y="268" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ff6b35" fill-opacity="0.45" letter-spacing="4">CRASH</text>
</svg>
