<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001508"/>
      <stop offset="100%" stop-color="#002510"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="explode" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- 5x4 grid -->
  <!-- row 1 -->
  <rect x="22" y="30" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <rect x="97" y="30" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <rect x="172" y="30" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <rect x="247" y="30" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <rect x="322" y="30" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <!-- row 2 -->
  <rect x="22" y="95" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <!-- gem tile -->
  <rect x="97" y="95" width="62" height="52" rx="8" fill="#083320" stroke="#41f0a4" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="128,105 137,120 128,135 119,120" fill="#41f0a4" opacity="0.95"/>
  <polygon points="128,109 135,120 128,131 121,120" fill="white" fill-opacity="0.3"/>
  <rect x="172" y="95" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <!-- mine exploded -->
  <rect x="247" y="95" width="62" height="52" rx="8" fill="#180400" stroke="#ff4757" stroke-width="1.5" filter="url(#explode)"/>
  <circle cx="278" cy="121" r="13" fill="#ff4757" fill-opacity="0.85" filter="url(#explode)"/>
  <circle cx="278" cy="121" r="7" fill="#ff8a3d"/>
  <line x1="278" y1="100" x2="278" y2="107" stroke="#ff4757" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="278" y1="135" x2="278" y2="142" stroke="#ff4757" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="257" y1="121" x2="264" y2="121" stroke="#ff4757" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="292" y1="121" x2="299" y2="121" stroke="#ff4757" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="322" y="95" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <!-- row 3 -->
  <!-- gem -->
  <rect x="22" y="160" width="62" height="52" rx="8" fill="#083320" stroke="#41f0a4" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="53,170 62,185 53,200 44,185" fill="#41f0a4" opacity="0.95"/>
  <polygon points="53,174 60,185 53,196 46,185" fill="white" fill-opacity="0.3"/>
  <rect x="97" y="160" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <!-- gem -->
  <rect x="172" y="160" width="62" height="52" rx="8" fill="#083320" stroke="#41f0a4" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="203,170 212,185 203,200 194,185" fill="#41f0a4" opacity="0.95"/>
  <polygon points="203,174 210,185 203,196 196,185" fill="white" fill-opacity="0.3"/>
  <rect x="247" y="160" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <rect x="322" y="160" width="62" height="52" rx="8" fill="#0a2414" stroke="#164d26" stroke-width="1.5"/>
  <!-- label + multiplier -->
  <text x="22" y="258" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#41f0a4" fill-opacity="0.45" letter-spacing="4">MINES</text>
  <text x="200" y="260" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-size="22" font-weight="900" fill="#41f0a4" fill-opacity="0.65" filter="url(#glow)">3.80×</text>
</svg>
